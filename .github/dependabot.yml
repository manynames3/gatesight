version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly }
  - package-ecosystem: pip
    directory: /
    schedule: { interval: weekly }
    ignore:
      - dependency-name: numpy
        versions: [">=2.4"]
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
  - package-ecosystem: terraform
    directory: /infrastructure/terraform/modules/gatesight
    schedule: { interval: weekly }
