name: deploy-recognition-worker

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options: [dev]
        default: dev
      image_uri:
        description: Optional existing signed ECR image URI by digest
        type: string
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: gatesight-recognition-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      AWS_REGION: ${{ vars.WORKER_AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_URL: ${{ vars.WORKER_ECR_REPOSITORY_URL }}
      LAMBDA_FUNCTION_NAME: gatesight-${{ inputs.environment || 'dev' }}-recognition-worker
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.13"
          enable-cache: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.WORKER_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: sigstore/cosign-installer@v3.9.2
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - run: uv sync --frozen --extra api --extra recognition --group dev
      - run: uv run pytest tests/unit
      - name: Resolve an existing immutable image
        id: existing-image
        env:
          REQUESTED_IMAGE_URI: ${{ inputs.image_uri }}
        run: |
          IMAGE_URI="$REQUESTED_IMAGE_URI"
          ALLOW_RETRY_SIGNING=false
          if [[ -z "$IMAGE_URI" ]]; then
            DIGEST="$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY_URL##*/}" \
              --image-ids imageTag="$GITHUB_SHA" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true)"
            if [[ "$DIGEST" == sha256:* ]]; then
              IMAGE_URI="$ECR_REPOSITORY_URL@$DIGEST"
              ALLOW_RETRY_SIGNING=true
            fi
          fi
          if [[ -n "$IMAGE_URI" ]]; then
            case "$IMAGE_URI" in
              "$ECR_REPOSITORY_URL"@sha256:????????????????????????????????????????????????????????????????) ;;
              *) echo "Refusing image outside the configured repository or without a digest" >&2; exit 2 ;;
            esac
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
            echo "allow_retry_signing=$ALLOW_RETRY_SIGNING" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build portfolio-scoped worker
        if: steps.existing-image.outputs.exists != 'true'
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg GATESIGHT_MODEL_RELEASE_SCOPE=portfolio \
            -f services/recognition_worker/Dockerfile \
            -t "$ECR_REPOSITORY_URL:$GITHUB_SHA" \
            .
      - name: Verify models are readable by the Lambda runtime user
        if: steps.existing-image.outputs.exists != 'true'
        run: |
          docker run --rm \
            --user 10001:10001 \
            --entrypoint /bin/sh \
            "$ECR_REPOSITORY_URL:$GITHUB_SHA" \
            -c 'for model in /opt/models/*; do test -r "$model"; done'
      - name: Publish immutable image
        if: steps.existing-image.outputs.exists != 'true'
        run: |
          docker push "$ECR_REPOSITORY_URL:$GITHUB_SHA"
      - name: Build event consumer packages
        run: |
          docker build \
            --platform linux/arm64 \
            -f infrastructure/lambda/Dockerfile.zip \
            --output type=local,dest=build \
            .
      - name: Resolve and verify immutable image
        env:
          EXISTING_IMAGE_URI: ${{ steps.existing-image.outputs.image_uri }}
          ALLOW_RETRY_SIGNING: ${{ steps.existing-image.outputs.allow_retry_signing }}
        run: |
          IMAGE_URI="$EXISTING_IMAGE_URI"
          if [[ -z "$IMAGE_URI" ]]; then
            DIGEST="$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY_URL##*/}" \
              --image-ids imageTag="$GITHUB_SHA" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            IMAGE_URI="$ECR_REPOSITORY_URL@$DIGEST"
            cosign sign --yes "$IMAGE_URI"
          elif [[ "$ALLOW_RETRY_SIGNING" == "true" ]] && ! cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/deploy-worker.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE_URI" >/dev/null 2>&1; then
            cosign sign --yes "$IMAGE_URI"
          fi
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/deploy-worker.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "### Recognition worker image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$IMAGE_URI\`" >> "$GITHUB_STEP_SUMMARY"
      - name: Deploy worker digest
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"
          aws lambda wait function-updated-v2 \
            --function-name "$LAMBDA_FUNCTION_NAME"
          aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Code.ResolvedImageUri' \
            --output text
      - name: Deploy control API and event consumers
        run: |
          for service in control-api outbox-publisher visit-projector security-evaluator heartbeat-monitor; do
            aws lambda update-function-code \
              --function-name "gatesight-${{ inputs.environment || 'dev' }}-$service" \
              --zip-file "fileb://build/lambda/$service.zip"
            aws lambda wait function-updated-v2 \
              --function-name "gatesight-${{ inputs.environment || 'dev' }}-$service"
          done
