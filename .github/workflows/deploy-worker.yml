name: deploy-recognition-worker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        type: choice
        options: [dev]
        default: dev

permissions:
  contents: read
  id-token: write

concurrency:
  group: gatesight-recognition-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: ${{ vars.WORKER_AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_URL: ${{ vars.WORKER_ECR_REPOSITORY_URL }}
      LAMBDA_FUNCTION_NAME: gatesight-${{ inputs.environment }}-recognition-worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.13"
          enable-cache: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.WORKER_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: sigstore/cosign-installer@v3.9.2
      - run: uv sync --frozen --extra api --extra recognition --group dev
      - run: uv run pytest tests/unit
      - name: Build portfolio-scoped worker
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg GATESIGHT_MODEL_RELEASE_SCOPE=portfolio \
            -f services/recognition_worker/Dockerfile \
            -t "$ECR_REPOSITORY_URL:$GITHUB_SHA" \
            .
      - name: Publish and verify immutable image
        run: |
          docker push "$ECR_REPOSITORY_URL:$GITHUB_SHA"
          DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY_URL##*/}" \
            --image-ids imageTag="$GITHUB_SHA" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          IMAGE_URI="$ECR_REPOSITORY_URL@$DIGEST"
          cosign sign --yes "$IMAGE_URI"
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/deploy-worker.yml@" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "### Recognition worker image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$IMAGE_URI\`" >> "$GITHUB_STEP_SUMMARY"
      - name: Deploy worker digest
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"
          aws lambda wait function-updated-v2 \
            --function-name "$LAMBDA_FUNCTION_NAME"
          aws lambda get-function \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Code.ResolvedImageUri' \
            --output text
