name: pull-request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.8.13", enable-cache: true }
      - run: uv sync --frozen --extra api --extra recognition --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy packages services
      - run: uv run pytest --cov --cov-report=xml tests/unit
      - run: uv run bandit -c pyproject.toml -r packages services scripts ml
      - run: uv run pip-audit
      - run: uv run python scripts/export_openapi.py
      - run: git diff --exit-code packages/contracts/openapi.json

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.14.9" }
      - uses: terraform-linters/setup-tflint@v4
        with: { tflint_version: "v0.58.1" }
      - run: terraform fmt -check -recursive infrastructure/terraform
      - run: terraform -chdir=infrastructure/terraform/environments/dev init -backend=false
      - run: terraform -chdir=infrastructure/terraform/environments/dev validate
      - run: tflint --chdir infrastructure/terraform/environments/dev --recursive
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/terraform
          framework: terraform

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.8.13" }
      - run: uv run python ml/download_models.py --manifest ml/model-manifest.json --output build/models --verify
      - run: docker build --platform linux/amd64 -f services/recognition_worker/Dockerfile -t gatesight-recognition:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: gatesight-recognition:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - uses: anchore/sbom-action@v0
        with:
          image: gatesight-recognition:${{ github.sha }}
          output-file: build/gatesight-recognition.spdx.json
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
